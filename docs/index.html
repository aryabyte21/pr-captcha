<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="refresh"
      content="0; url=https://pr-captcha.aryaabyte.workers.dev/"
    />

    <meta

      content="pr-captcha is a free PR spam bouncer for AI slop. The live app runs on the hosted Worker."
    />
    <link rel="canonical" href="https://pr-captcha.aryaabyte.workers.dev/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="pr-captcha" />
    <meta
      property="og:url"
      content="https://pr-captcha.aryaabyte.workers.dev/"
    />
    <meta property="og:title" content="Make PR spam knock first." />
    <meta
      property="og:description"
      content="A free hosted Worker for SHA-bound human checks before suspicious pull requests burn CI."
    />
    <meta
      property="og:image"
      content="https://pr-captcha.aryaabyte.workers.dev/og.svg"
    />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="pr-captcha pull request human receipt preview"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Make PR spam knock first." />
    <meta
      name="twitter:description"
      content="A free hosted Worker for SHA-bound human checks before suspicious pull requests burn CI."
    />
    <meta
      name="twitter:image"
      content="https://pr-captcha.aryaabyte.workers.dev/og.svg"
    />
    <meta
      name="twitter:image:alt"
      content="pr-captcha pull request human receipt preview"
    />
    <link
      rel="icon"
      href="https://pr-captcha.aryaabyte.workers.dev/assets/pr-captcha-mark.svg"
    />
    <script>
      window.location.replace("https://pr-captcha.aryaabyte.workers.dev/");
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8faf9;
        --ink: #08111a;
        --muted: #586474;
        --line: #d8e1dc;
        --green: #0f766e;
        --green-soft: #e9f8ef;
        --dark: #071018;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(90deg, rgba(8, 17, 26, 0.05) 1px, transparent 1px),
          linear-gradient(rgba(8, 17, 26, 0.05) 1px, transparent 1px), var(--bg);
        background-size: 70px 70px;
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        padding: 28px;
        box-shadow: 0 24px 60px rgba(8, 17, 26, 0.08);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
        color: var(--ink);
        font-size: 24px;
        font-weight: 900;
        text-decoration: none;
      }

      .brand img {
        width: 42px;
        height: 42px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 7vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        min-height: 50px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 18px;
        color: var(--ink);
        font-weight: 850;
        text-decoration: none;
      }

      .button.primary {
        border-color: var(--dark);
        background: var(--dark);
        color: #ffffff;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 24px;
        border: 1px solid #a8efbf;
        border-radius: 999px;
        background: var(--green-soft);
        padding: 8px 12px;
        color: var(--green);
        font-size: 14px;
        font-weight: 850;
      }

      @media (max-width: 520px) {
        main {
          padding: 22px;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <a class="brand" href="https://pr-captcha.aryaabyte.workers.dev/">
        <img
          src="https://pr-captcha.aryaabyte.workers.dev/assets/pr-captcha-mark.svg"
          alt=""
        />
        <span>pr-captcha</span>
      </a>
      <h1>Opening the hosted Worker.</h1>
      <p>
        GitHub Pages is only the fallback. The live free app runs on the Worker.
      </p>
      <div class="actions">
        <a
          class="button primary"
          href="https://pr-captcha.aryaabyte.workers.dev/"
          >Open Worker</a
        >
        <a
          class="button"
          href="https://pr-captcha.aryaabyte.workers.dev/setup-wizard"
          >Make policy</a
        >
      </div>
      <div class="status">Redirecting to pr-captcha.aryaabyte.workers.dev</div>
    </main>
  </body>
</html>
