name: Worker Deploy

on:
  push:
    branches:
      - main
    paths:
      - apps/worker/**
      - docs/**
      - packages/action/**
      - package.json
      - package-lock.json
      - .github/workflows/worker-deploy.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: worker-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Preflight deployment environment
        run: node scripts/deploy-preflight.mjs

      - name: Install
        run: npm ci

      - name: Validate
        run: |
          npm run check
          npm test
          npm run build

      - name: Apply D1 migrations
        working-directory: apps/worker
        run: npx wrangler d1 migrations apply pr-captcha --remote

      - name: Deploy Worker
        working-directory: apps/worker
        run: npx wrangler deploy
